name: Build and Deploy Flask App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 341738837029.dkr.ecr.eu-north-1.amazonaws.com

      - name: Build Docker image
        run: |
          docker build -t flask-docker-app .
          docker tag flask-docker-app:latest 341738837029.dkr.ecr.eu-north-1.amazonaws.com/flask-docker-app:latest

      - name: Push to ECR
        run: |
          docker push 341738837029.dkr.ecr.eu-north-1.amazonaws.com/flask-docker-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region eu-north-1 | sudo docker login --username AWS --password-stdin 341738837029.dkr.ecr.eu-north-1.amazonaws.com
            sudo docker pull 341738837029.dkr.ecr.eu-north-1.amazonaws.com/flask-docker-app:latest
            sudo docker stop flask-app || true
            sudo docker rm flask-app || true
            sudo docker run -d -p 5000:5000 --name flask-app 341738837029.dkr.ecr.eu-north-1.amazonaws.com/flask-docker-app:latest
